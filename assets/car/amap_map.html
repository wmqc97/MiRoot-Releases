<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>车辆位置</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1d23; font-family:-apple-system, "PingFang SC", sans-serif; }
  #container { width:100%; height:100%; min-height:180px; border-radius:12px; overflow:hidden; position:relative; }
  #map { width:100%; height:100%; min-height:180px; }
  .loading-overlay {
    position:absolute; top:0; left:0; right:0; bottom:0;
    display:flex; align-items:center; justify-content:center;
    background:#1a1d23; color:#8a8f98; font-size:13px;
    transition:opacity 0.5s; z-index:10;
  }
  .loading-overlay.hidden { opacity:0; pointer-events:none; }
</style>
</head>
<body>
<div id="container">
  <div class="loading-overlay" id="loadingOverlay">加载地图中...</div>
  <div id="map"></div>
</div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var AMAP_KEY = params.get('key') || '';
  var _pendingLng = parseFloat(params.get('lng'));
  var _pendingLat = parseFloat(params.get('lat'));
  if (isNaN(_pendingLng)) _pendingLng = 113.27;
  if (isNaN(_pendingLat)) _pendingLat = 23.13;

  var _amapLoaded = false;
  var _mapInstance = null;
  var _marker = null;
  var _label = null;

  function hideLoading() {
    var el = document.getElementById('loadingOverlay');
    if (el) el.classList.add('hidden');
  }

  function showError(msg) {
    var el = document.getElementById('loadingOverlay');
    if (el) {
      el.textContent = msg;
      el.classList.remove('hidden');
    }
  }

  function markerSvg() {
    return '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="38" viewBox="0 0 24 28">' +
      '<path fill="#3482ff" d="M12 0C7.58 0 4 3.58 4 8c0 6 8 16 8 16s8-10 8-16c0-4.42-3.58-8-8-8z"/>' +
      '<circle cx="12" cy="8" r="3" fill="#fff"/></svg>';
  }

  function initMap() {
    var lng = _pendingLng;
    var lat = _pendingLat;
    _mapInstance = new AMap.Map('map', {
      zoom: 15,
      center: [lng, lat],
      mapStyle: 'amap://styles/normal',
      viewMode: '2D',
      zoomEnable: true,
      dragEnable: true
    });

    _marker = new AMap.Marker({
      position: [lng, lat],
      icon: new AMap.Icon({
        image: 'data:image/svg+xml,' + encodeURIComponent(markerSvg()),
        size: new AMap.Size(32, 38),
        imageSize: new AMap.Size(32, 38)
      }),
      offset: new AMap.Pixel(-16, -38)
    });
    _mapInstance.add(_marker);

    _label = new AMap.Text({
      text: '我的车辆',
      anchor: 'bottom-center',
      offset: new AMap.Pixel(0, -44),
      position: [lng, lat],
      style: {
        'background-color': 'rgba(52,130,255,0.92)',
        'border': 'none',
        'color': '#fff',
        'font-size': '11px',
        'font-weight': '600',
        'padding': '3px 8px',
        'border-radius': '10px'
      }
    });
    _mapInstance.add(_label);
    hideLoading();
  }

  window.updatePosition = function(lng, lat) {
    _pendingLng = lng;
    _pendingLat = lat;
    if (!_mapInstance) return;
    _mapInstance.setCenter([lng, lat]);
    if (_marker) _marker.setPosition([lng, lat]);
    if (_label) _label.setPosition([lng, lat]);
    hideLoading();
  };

  function loadAMap() {
    if (_amapLoaded) return;
    if (!AMAP_KEY) {
      showError('未配置高德 Key');
      return;
    }
    _amapLoaded = true;
    var s = document.createElement('script');
    s.src = 'https://webapi.amap.com/maps?v=2.0&key=' + encodeURIComponent(AMAP_KEY);
    s.onload = function() { initMap(); };
    s.onerror = function() { showError('地图脚本加载失败'); };
    document.head.appendChild(s);
  }

  loadAMap();
})();
</script>
</body>
</html>
